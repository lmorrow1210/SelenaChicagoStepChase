<!-- @dsCard group="Components" viewport="700x320" name="Progress Strip" subtitle="Straight-line leaderboard · default / end / empty" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style> body { padding: 24px; } .stack { display:flex; flex-direction:column; gap:16px; max-width:620px; } .lab { font-family:var(--font-body); font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { ProgressStrip } = window.DesignSystem_19034b;
  const players = [
    { id:'a', pct: 38, colorway:'chicago' },
    { id:'b', pct: 61, colorway:'emerald', leader:true },
    { id:'c', pct: 22, colorway:'desert' },
  ];
  function Demo() {
    return (
      <div className="stack">
        <div><div className="lab">In progress</div><ProgressStrip from="Chicago" to="Tokyo" players={players} /></div>
        <div><div className="lab">Someone reached 100%</div><ProgressStrip from="Chicago" to="Tokyo" state="end" players={[{id:'b',pct:100,colorway:'emerald',leader:true},{id:'a',pct:74,colorway:'chicago'}]} /></div>
        <div><div className="lab">Empty (week not started)</div><ProgressStrip from="Chicago" to="Tokyo" state="empty" /></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
