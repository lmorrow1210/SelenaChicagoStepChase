<!-- @dsCard group="Components" viewport="700x360" name="Navigation — Sidebar & Tab Bar" subtitle="Desktop sidebar (expanded) + mobile bottom tabs" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style> body { padding: 24px; } .wrap{display:flex;gap:30px;align-items:flex-start;} .lab{font-family:var(--font-body);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;} </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Sidebar, TabBar, Avatar } = window.DesignSystem_19034b;
  function Demo() {
    const [a,setA] = React.useState('map');
    return (
      <div className="wrap">
        <div>
          <div className="lab">Desktop sidebar (collapsed)</div>
          <div style={{ height: 300, borderRadius: 8, overflow:'hidden', border:'1px solid var(--hairline)' }}>
            <Sidebar active={a} onNavigate={setA} avatar={<Avatar size={40} colorway="chicago" />} />
          </div>
        </div>
        <div>
          <div className="lab">Desktop sidebar (expanded)</div>
          <div style={{ height: 300, borderRadius: 8, overflow:'hidden', border:'1px solid var(--hairline)' }}>
            <Sidebar active={a} onNavigate={setA} forceExpanded avatar={<Avatar size={40} colorway="emerald" />} />
          </div>
        </div>
        <div style={{ flex: 1 }}>
          <div className="lab">Mobile tab bar</div>
          <div style={{ maxWidth: 380, borderRadius: 8, overflow:'hidden', border:'1px solid var(--hairline)' }}>
            <TabBar active={a} onNavigate={setA} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
