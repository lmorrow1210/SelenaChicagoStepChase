<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--navy); display:flex; gap:14px; align-items:flex-end; }
  .s { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar { background:var(--blue); border-radius:var(--r-tight); width:100%; }
  .nm { font-family:var(--font-mono); font-size:11px; color:var(--muted); }
</style>
</head>
<body>
  <div class="s" style="width:24px"><div class="bar" style="height:4px"></div><div class="nm">4</div></div>
  <div class="s" style="width:24px"><div class="bar" style="height:8px"></div><div class="nm">8</div></div>
  <div class="s" style="width:24px"><div class="bar" style="height:12px"></div><div class="nm">12</div></div>
  <div class="s" style="width:24px"><div class="bar" style="height:16px"></div><div class="nm">16</div></div>
  <div class="s" style="width:24px"><div class="bar" style="height:24px"></div><div class="nm">24</div></div>
  <div class="s" style="width:24px"><div class="bar" style="height:32px"></div><div class="nm">32</div></div>
  <div class="s" style="width:24px"><div class="bar" style="height:48px"></div><div class="nm">48</div></div>
  <div class="s" style="width:24px"><div class="bar" style="height:64px"></div><div class="nm">64</div></div>
  <div class="s" style="width:24px"><div class="bar" style="height:96px"></div><div class="nm">96</div></div>
</body>
</html>
