<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <title>Seattle</title>
  <!-- Space Needle -->
  <rect x="47" y="50" width="6" height="42" fill="#ffffff" />
  <polygon points="40,50 60,50 55,30 45,30" fill="white" />
  <rect x="44" y="22" width="12" height="8" fill="currentColor" rx="1" />
  <rect x="49" y="14" width="2" height="9" fill="#fff" />
  <!-- Observation deck ring -->
  <ellipse cx="50" cy="30" rx="14" ry="3" fill="white" />
  <!-- Base legs -->
  <line x1="40" y1="92" x2="50" y2="50" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
  <line x1="60" y1="92" x2="50" y2="50" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
  <line x1="50" y1="92" x2="50" y2="50" stroke="white" stroke-width="2" stroke-linecap="round" />
  <!-- Ground -->
  <rect x="10" y="92" width="80" height="4" fill="#ffffff" rx="1" />
</svg>
