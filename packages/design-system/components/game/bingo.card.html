<!-- @dsCard group="Components" viewport="700x340" name="Bingo Tile & Card" subtitle="Tile states + a 5×5 card with a winning line" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style> body { padding: 24px; } .wrap{display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap;} .tiles{display:grid;grid-template-columns:repeat(2,108px);gap:10px;} .card5{display:grid;grid-template-columns:repeat(5,58px);gap:7px;} </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { BingoTile } = window.DesignSystem_19034b;
  const ICONS = ['step','workout','sleep','heart','flame','sync','star','badge','crown','globe','trophy','city','map','prediction','nemesis','clock','settings','step','workout','heart','flame','sleep','badge','star'];
  // 5x5 with a winning middle row
  const states = [
    'complete','incomplete','progress','incomplete','complete',
    'incomplete','complete','incomplete','progress','incomplete',
    'win','win','free','win','win',
    'progress','incomplete','complete','incomplete','incomplete',
    'complete','incomplete','progress','incomplete','complete',
  ];
  function Demo() {
    let ii = 0;
    return (
      <div className="wrap">
        <div className="tiles">
          <BingoTile label="10k steps" icon="step" state="incomplete" />
          <BingoTile label="Morning walk" icon="workout" state="progress" />
          <BingoTile label="8h sleep" icon="sleep" state="complete" />
          <BingoTile state="free" />
        </div>
        <div className="card5">
          {states.map((s,i)=>(
            <BingoTile key={i} icon={ICONS[i%ICONS.length]} label=""
              state={s==='win'?'complete':s}
              highlight={s==='win'} />
          ))}
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
