<!-- @dsCard group="Components" viewport="700x420" name="Forms — Input & Slider" subtitle="Dark-fill inputs, numeric field, step-target slider" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 28px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: start; max-width: 640px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Slider } = window.DesignSystem_19034b;
  function Demo() {
    const [name, setName] = React.useState('Lakefront Steppers');
    const [pred, setPred] = React.useState('48,500');
    const [target, setTarget] = React.useState(8500);
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 28 }}>
        <div className="row">
          <Input label="Group name" value={name} onChange={e=>setName(e.target.value)} />
          <Input label="Group name (focus)" placeholder="Type a name…" invalid />
        </div>
        <Input variant="numeric" suffix="steps" value={pred} onChange={e=>setPred(e.target.value)} />
        <Slider label="Daily step target" value={target} min={2000} max={20000} step={500} onChange={setTarget} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
