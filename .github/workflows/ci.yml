name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: selenas_chase_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck api
        run: npx tsc --noEmit -p apps/api/tsconfig.json
      - name: Test api (unit + integration)
        run: npm run test -w apps/api
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/selenas_chase_test
      - name: Build web
        run: npm run build -w apps/web
      # Design-token adherence (plan §7 / hard rule 4): app code must use
      # tokens, never raw hex. (The design-system bundle itself holds the hex
      # constants, so only app code is gated. oxlint can't run the original
      # _adherence.oxlintrc.json — no no-restricted-syntax support — so this
      # enforces the load-bearing rule directly.)
      - name: Design-token adherence (no raw hex in app code)
        run: |
          if grep -rEn '#[0-9a-fA-F]{3,8}\b' apps/web/app apps/web/lib --include='*.tsx' --include='*.ts'; then
            echo '::error::Raw hex color in app code — use a design-system token via var(--…)'
            exit 1
          fi
