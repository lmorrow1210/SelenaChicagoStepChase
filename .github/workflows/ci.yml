name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: selenas_chase_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck api
        run: npx tsc --noEmit -p apps/api/tsconfig.json
      - name: Test api (unit + integration)
        run: npm run test -w apps/api
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/selenas_chase_test
      - name: Build web
        run: npm run build -w apps/web
      # TODO(M0 checklist): add oxlint with SelenaDesign/_adherence.oxlintrc.json
      # so raw hex / magic numbers outside tokens/ fail the build (plan §7).
